services:
  db:
    image: postgres:16
    container_name: univibe-db
    environment:
      POSTGRES_DB: univibe
      POSTGRES_USER: univibe
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-QFh#9TT6y%#c7wmiELTcrN}
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U univibe"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - univibe-network
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: univibe-backend
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ./backend/.env
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/univibe
      - SPRING_DATASOURCE_USERNAME=univibe
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD:-QFh#9TT6y%#c7wmiELTcrN}
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - univibe-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend/web
      dockerfile: Dockerfile.prod
      args:
        - VITE_API_BASE_URL=${VITE_API_BASE_URL:-https://uni-vibe.com/api}
        - VITE_WS_BASE_URL=${VITE_WS_BASE_URL:-https://uni-vibe.com}
    container_name: univibe-frontend
    depends_on:
      - backend
    ports:
      - "5173:80"
    networks:
      - univibe-network
    restart: unless-stopped

volumes:
  db-data:
    driver: local

networks:
  univibe-network:
    driver: bridge

