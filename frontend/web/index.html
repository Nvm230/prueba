<!doctype html>

    <title>UniVibe</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <script>
      // POLYFILL CRÍTICO - Debe ejecutarse ANTES de cualquier otro código
      // Este script se ejecuta de forma síncrona y bloqueante
      (function() {
        'use strict';
        // Asegurar globalThis inmediatamente
        if (typeof globalThis === 'undefined') {
          if (typeof window !== 'undefined') window.globalThis = window;
          else if (typeof global !== 'undefined') global.globalThis = global;
          else if (typeof self !== 'undefined') self.globalThis = self;
        }
        
        // Polyfill Request - FORZAR siempre, incluso si ya existe
        // Esto debe ejecutarse ANTES de que cualquier módulo intente importar Request
        var RequestImpl;
        if (typeof fetch !== 'undefined') {
          RequestImpl = function Request(input, init) {
            if (!(this instanceof RequestImpl)) {
              throw new TypeError('Failed to construct \'Request\': Please use the \'new\' operator');
            }
            this.url = typeof input === 'string' ? input : (input instanceof URL ? input.href : (input && input.url ? input.url : String(input)));
            init = init || {};
            this.method = (init.method || 'GET').toUpperCase();
            this.headers = new Headers(init.headers || {});
            this.body = init.body !== undefined ? init.body : null;
            this.mode = init.mode || 'cors';
            this.credentials = init.credentials || 'same-origin';
            this.cache = init.cache || 'default';
            this.redirect = init.redirect || 'follow';
            this.referrer = init.referrer || 'about:client';
            this.integrity = init.integrity || '';
          };

            return Object.assign(Object.create(Object.getPrototypeOf(this)), this);
          };

          // Fallback si fetch no está disponible
          RequestImpl = function Request() {
            throw new Error('Request is not supported in this environment');
          };
        }
        
        // FORZAR en todos los contextos - SOBRESCRIBIR si existe
        // Esto debe hacerse ANTES de que cualquier módulo se cargue
        var contexts = [];
        if (typeof globalThis !== 'undefined') contexts.push(globalThis);
        if (typeof window !== 'undefined') contexts.push(window);
        if (typeof self !== 'undefined') contexts.push(self);
        if (typeof global !== 'undefined') contexts.push(global);
        
        contexts.forEach(function(ctx) {
          ctx.Request = RequestImpl;
          try {
            Object.defineProperty(ctx, 'Request', {
              value: RequestImpl,
              writable: true,
              configurable: true,
              enumerable: true
            });
          } catch(e) {
            // Si falla, al menos asignar directamente
            ctx.Request = RequestImpl;
          }
        });
        
        // Asegurar que también esté disponible como exportación de módulo común
        if (typeof module !== 'undefined' && module.exports) {
          module.exports.Request = RequestImpl;
        }
        
        // Interceptar accesos a Request en módulos undefined
        // Esto previene errores cuando dependencias intentan: const { Request } = undefinedModule
        if (typeof Proxy !== 'undefined') {
          try {
            // Crear un objeto proxy que devuelva Request cuando se acceda a propiedades

              get: function(target, prop) {
                if (prop === 'Request') {
                  return RequestImpl;
                }
                return undefined;
              }
            });
            // Guardar en un lugar accesible para casos extremos
            if (typeof globalThis !== 'undefined') {
              globalThis.__requestPolyfill = requestProxy;
            }
          } catch(e) {
            // Si Proxy no está disponible, continuar sin interceptor
          }
        }
