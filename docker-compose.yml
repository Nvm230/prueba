services:
  db:
    image: postgres:16
    container_name: univibe-db
    environment:
      POSTGRES_DB: univibe
      POSTGRES_USER: univibe
      POSTGRES_PASSWORD: univibe
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U univibe"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - univibe-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: univibe-backend
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ./backend/.env
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/univibe
      - SPRING_DATASOURCE_USERNAME=univibe
      - SPRING_DATASOURCE_PASSWORD=univibe
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - univibe-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend/web
      dockerfile: Dockerfile
      args:
        # Usar localhost:8080 igual que en desarrollo local
        - VITE_API_BASE_URL=${VITE_API_BASE_URL:-http://localhost:8080}
        - VITE_WS_BASE_URL=${VITE_WS_BASE_URL:-http://localhost:8080}
    container_name: univibe-frontend
    depends_on:
      - backend
    ports:
      # Puerto 5173 (puerto por defecto de Vite dev server) - igual que en local
      - "5173:5173"
    networks:
      - univibe-network
    restart: unless-stopped
    # Volumen para hot-reload (opcional, pero útil para desarrollo)
    volumes:
      - ./frontend/web:/app
      - /app/node_modules

volumes:
  db-data:
    driver: local

networks:
  univibe-network:
    driver: bridge
