services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: univibe
      POSTGRES_USER: univibe
      POSTGRES_PASSWORD: univibe
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - db
    env_file:
      - .env
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/univibe

  frontend:
    build:
      context: ../frontend/web
      dockerfile: Dockerfile
      args:
        - VITE_API_BASE_URL=http://localhost:8080
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  db-data:
